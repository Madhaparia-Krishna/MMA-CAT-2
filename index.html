<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Save Our Wildlife</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <main class="page-wrapper">
    <section class="hero">
      <h1>Save Our Wildlife</h1>

      <p class="intro">
        Wildlife conservation protects endangered animals and their natural habitats.
      </p>

      <div class="video-container">
        <video id="wildlifeVideo" controls aria-label="Wildlife conservation promotional video">
          <source src="wildlife.mp4" type="video/mp4" />
          Your browser does not support the video tag.
        </video>
      </div>

      <p class="description">
        This promotional video explains the importance of protecting wildlife,
        reducing habitat destruction, and supporting conservation efforts.
        Nat Geo Kids get the credits
        </p>

      <button id="videoToggleBtn" type="button">
        Hide Video
      </button>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
